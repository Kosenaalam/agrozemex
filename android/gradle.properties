# ============================================================
# MEMORY FIX for 7GB RAM machine (i3-1115G4, Windows 11)
#
# Root cause: G1GC requires large native memory for virtual space bookkeeping.
# On 7GB RAM with 70 JVM threads (Kotlin compiler workers), the G1 heap
# manager ran out of native address space → "G1 virtual space mmap failed".
#
# Fix: Use SerialGC (single-threaded GC, minimal native overhead) + smaller heap.
# Build cache DISABLED: it writes corrupt entries when JVM hits heap limit mid-write.
# ============================================================
org.gradle.jvmargs=-Xmx1800m -Xms256m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseSerialGC
android.useAndroidX=true

# Limit Gradle to 2 parallel workers max (was defaulting to 4 on quad-core, OOM'ing)
org.gradle.workers.max=2

# Build cache DISABLED: produces corrupt DEX cache entries when heap is exhausted mid-write
org.gradle.caching=false

# Reuse Gradle daemon (prevents JVM startup cost on every build)
org.gradle.daemon=true

# Keep Kotlin compiler in-process to avoid spawning a separate heavy JVM daemon
kotlin.compiler.execution.strategy=in-process
